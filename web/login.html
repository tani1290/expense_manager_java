<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Expense Manager</title>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        window.onload = function () {
            const params = new URLSearchParams(window.location.search);
            const container = document.querySelector('.login-container');
            const errors = {
                'InvalidCredentials': ['Invalid username or password.', 'error'],
                'MissingFields': ['Please fill in all fields.', 'error'],
                'registered': ['Registration successful! Please login.', 'success']
            };
            for (const [key, val] of Object.entries(errors)) {
                if (params.get(key) === 'true' || params.get('error') === key) {
                    const msg = document.createElement('div');
                    msg.className = val[1];
                    msg.textContent = val[0];
                    container.prepend(msg);
                    break;
                }
            }
        }
    </script>
</head>
<body>
    <div class="login-container">
        <h2>Sign In</h2>
        <form action="login" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-block">Sign In</button>
            </div>
        </form>
        <div class="mt-2 text-center">
            <a href="register.html">Don't have an account? Create one</a>
        </div>
        <div class="mt-2 text-center" style="padding: 0.75rem; background: var(--primary-bg); border-radius: 8px; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
            <strong>Demo:</strong> Username: <code>demo</code> | Password: <code>demo123</code>
        </div>
    </div>
</body>
</html>
