<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense - Expense Manager</title>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        window.onload = function () {
            document.getElementById('date').valueAsDate = new Date();

            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            if (error) {
                const msg = document.createElement('div');
                msg.className = 'error';
                switch (error) {
                    case 'InvalidInput':
                        msg.textContent = 'Please enter valid values for all fields.';
                        break;
                    case 'InvalidAmount':
                        msg.textContent = 'Amount must be greater than zero.';
                        break;
                    case 'InvalidDate':
                        msg.textContent = 'Please enter a valid date.';
                        break;
                    case 'MissingTitle':
                        msg.textContent = 'Please enter a title for the expense.';
                        break;
                    default:
                        msg.textContent = 'An error occurred. Please try again.';
                }
                document.querySelector('.container').prepend(msg);
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>Add New Expense</h2>
        <form action="addExpense" method="post" class="login-form">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="e.g. Lunch, Groceries" required>
            </div>

            <div class="form-group">
                <label for="amount">Amount ($)</label>
                <input type="number" id="amount" name="amount" step="0.01" min="0.01" placeholder="0.00" required>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category">
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Health">Health</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="description">Description (optional)</label>
                <input type="text" id="description" name="description" placeholder="Additional notes...">
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-block">Save Expense</button>
                <a href="viewExpenses" class="btn btn-secondary btn-block mt-1">Back to Expenses</a>
            </div>
        </form>
    </div>
</body>
</html>
